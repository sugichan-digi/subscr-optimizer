<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="サブスクリプション（定期課金）を管理し、更新日を最適化するダッシュボード">
  <meta name="keywords" content="サブスクリプション, 定期課金, 更新日, 最適化, ダッシュボード">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="/">
  <meta property="og:title" content="サブスク管理人 — サブスク最適化ダッシュボード">
  <meta property="og:description" content="サブスクリプション（定期課金）を管理し、更新日を最適化するダッシュボード">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="ja_JP">
  <meta property="og:url" content="/">
  <meta property="og:image" content="../favicon.svg">
  <meta property="og:site_name" content="サブスク管理人">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="サブスク管理人 — サブスク最適化ダッシュボード">
  <meta name="twitter:description" content="サブスクリプション（定期課金）を管理し、更新日を最適化するダッシュボード">
  <meta name="theme-color" content="#00406C">
  <title>サブスク管理人 — サブスク最適化ダッシュボード</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 0 0 2.25-2.25V6.75A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25v10.5A2.25 2.25 0 0 0 4.5 19.5z"/></svg>
        </span>
        <span class="logo-text">サブスク管理人</span>
      </div>
      <div class="header-actions">
        <button id="btn-add" class="btn btn-primary">＋ サブスクを追加</button>
        <div class="user-menu-wrap" id="user-menu-wrap">
          <button class="btn btn-secondary user-menu-btn" id="user-menu-btn">
            <span class="user-avatar">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/></svg>
            </span>
            <span id="user-display-name">...</span>
            <span class="chevron">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/></svg>
            </span>
          </button>
          <div class="user-dropdown" id="user-dropdown" hidden>
            <div class="dropdown-info">
              <span class="dropdown-email" id="dropdown-email"></span>
              <span class="dropdown-role" id="dropdown-role"></span>
            </div>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item" id="btn-logout">ログアウト</button>
            <button class="dropdown-item dropdown-item-danger" id="btn-withdraw-open">退会する</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="main">

    <div id="alerts-container"></div>

    <section class="kpi-section">
      <div class="kpi-card">
        <div class="kpi-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0 1 15.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 0 1 3 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 0 0-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 0 1-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 0 0 3 15h-.75M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm3 0h.008v.008H18V10.5Zm-12 0h.008v.008H6V10.5Z"/></svg>
        </div>
        <div class="kpi-label">月額合計</div>
        <div class="kpi-value" id="kpi-monthly">¥0</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 0 0 2.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 0 0-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75 2.25 2.25 0 0 0-.1-.664m-5.8 0A2.251 2.251 0 0 1 13.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25ZM6.75 12h.008v.008H6.75V12Zm0 3h.008v.008H6.75V15Zm0 3h.008v.008H6.75V18Z"/></svg>
        </div>
        <div class="kpi-label">登録中</div>
        <div class="kpi-value" id="kpi-count">0件</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5m-9-6h.008v.008H12v-.008ZM12 15h.008v.008H12V15Zm0 2.25h.008v.008H12v-.008ZM9.75 15h.008v.008H9.75V15Zm0 2.25h.008v.008H9.75v-.008ZM7.5 15h.008v.008H7.5V15Zm0 2.25h.008v.008H7.5v-.008Zm6.75-4.5h.008v.008h-.008v-.008Zm0 2.25h.008v.008h-.008V15Zm0 2.25h.008v.008h-.008v-.008Zm2.25-4.5h.008v.008H16.5v-.008Zm0 2.25h.008v.008H16.5V15Z"/></svg>
        </div>
        <div class="kpi-label">今月の更新</div>
        <div class="kpi-value" id="kpi-renewals">0件</div>
      </div>
      <div class="kpi-card kpi-alert-card">
        <div class="kpi-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
        </div>
        <div class="kpi-label">トライアル期限切れ間近</div>
        <div class="kpi-value" id="kpi-trials">0件</div>
      </div>
    </section>

    <section class="controls">
      <div class="filter-tabs" id="filter-tabs">
        <button class="filter-tab active" data-filter="all">すべて</button>
      </div>
      <div class="sort-control">
        <label for="sort-select">並び替え</label>
        <select id="sort-select">
          <option value="nextBilling">次回更新順</option>
          <option value="amount">金額が高い順</option>
          <option value="name">名前順</option>
        </select>
      </div>
    </section>

    <section id="subscriptions-grid" class="subscriptions-grid"></section>

    <div id="empty-state" class="empty-state">
      <div class="empty-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 13.5h3.86a2.25 2.25 0 0 1 2.012 1.244l.256.512a2.25 2.25 0 0 0 2.013 1.244h3.218a2.25 2.25 0 0 0 2.013-1.244l.256-.512a2.25 2.25 0 0 1 2.013-1.244h3.859m-19.5.338V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18v-4.162c0-.224-.034-.447-.1-.661L19.24 5.338a2.25 2.25 0 0 0-2.15-1.588H6.911a2.25 2.25 0 0 0-2.15 1.588L2.35 13.177a2.25 2.25 0 0 0-.1.661Z"/></svg>
      </div>
      <p class="empty-title">サブスクリプションがありません</p>
      <p class="empty-sub">追加ボタンから最初のサブスクを登録しましょう</p>
      <button class="btn btn-primary" id="btn-add-empty">＋ 最初のサブスクを追加する</button>
    </div>

  </main>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 id="modal-title" class="modal-title">サブスクを追加</h2>
        <button id="modal-close" class="modal-close" aria-label="閉じる">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
        </button>
      </div>

      <div class="modal-body">
        <div class="form-group">
          <label for="field-name">サービス名 <span class="required">*</span></label>
          <input type="text" id="field-name" placeholder="例: Netflix">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="field-category">カテゴリ</label>
            <select id="field-category">
              <option value="動画">動画</option>
              <option value="音楽">音楽</option>
              <option value="AI">AI</option>
              <option value="仕事">仕事</option>
              <option value="開発">開発</option>
              <option value="クリエイティブ">クリエイティブ</option>
              <option value="デザイン">デザイン</option>
              <option value="ストレージ">ストレージ</option>
              <option value="ゲーム">ゲーム</option>
              <option value="その他">その他</option>
            </select>
          </div>
          <div class="form-group">
            <label for="field-cycle">課金サイクル</label>
            <select id="field-cycle">
              <option value="monthly">月額</option>
              <option value="yearly">年額</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="field-amount">金額（円） <span class="required">*</span></label>
            <input type="number" id="field-amount" placeholder="1490" min="1">
          </div>
          <div class="form-group">
            <label for="field-next-billing">次回決済日 <span class="required">*</span></label>
            <input type="date" id="field-next-billing">
          </div>
        </div>

        <div class="form-group form-check-group">
          <label class="form-check-label">
            <input type="checkbox" id="field-is-trial">
            <span class="checkmark"></span>
            無料トライアル中
          </label>
        </div>

        <div class="form-group" id="trial-end-group">
          <label for="field-trial-end">トライアル終了日</label>
          <input type="date" id="field-trial-end">
        </div>

        <div class="form-group">
          <label for="field-notes">メモ</label>
          <textarea id="field-notes" placeholder="任意のメモを入力..." rows="2"></textarea>
        </div>

        <div class="form-divider"><span>プリセットから選択</span></div>
        <div class="form-group">
          <label for="preset-select">プリセットから選択</label>
          <select id="preset-select">
            <option value="">── カスタム入力 ──</option>
          </select>
        </div>
      </div>

      <div class="modal-footer">
        <button id="btn-delete" class="btn btn-danger">削除</button>
        <div class="modal-footer-right">
          <button id="btn-cancel" class="btn btn-secondary">キャンセル</button>
          <button id="btn-save" class="btn btn-primary">保存する</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 退会モーダル -->
  <div id="modal-withdraw" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 class="modal-title">退会の確認</h2>
        <button class="modal-close" id="withdraw-close">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <p class="withdraw-warn">退会するとすべてのサブスクデータが削除されます。<br>この操作は<strong>取り消せません</strong>。</p>
        <div id="withdraw-pw-group" class="form-group" style="margin-top:16px">
          <label for="withdraw-password">パスワード（確認）</label>
          <input type="password" id="withdraw-password" placeholder="••••••••">
        </div>
        <div id="withdraw-error" class="withdraw-error-msg"></div>
      </div>
      <div class="modal-footer">
        <div></div>
        <div class="modal-footer-right">
          <button class="btn btn-secondary" id="withdraw-cancel">キャンセル</button>
          <button class="btn btn-danger" id="btn-withdraw-confirm">退会する</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
